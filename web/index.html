<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>随机表情包</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .meme-grid {
      flex: 1;
      display: grid;
      gap: 3px;
      padding: 3px;
      background: #e0e0e0;
      min-height: 0;
      overflow: hidden;
    }
    
    .meme-item {
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    
    .meme-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }
    
    .meme-weight {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 0.65rem;
      padding: 2px 5px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .meme-item:active .meme-weight {
      opacity: 1;
    }
    
    .meme-tag {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 0.6rem;
      padding: 2px 5px;
      border-radius: 4px;
      max-width: 80%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    .meme-item:active .meme-tag {
      opacity: 1;
    }
    
    .bottom-bar {
      display: flex;
      background: #333;
    }
    
    .bottom-bar button {
      background: #333;
      color: white;
      border: none;
      padding: 16px;
      font-size: 1rem;
      cursor: pointer;
    }
    
    .btn-search {
      flex: 2;
      border-right: 1px solid #555;
    }
    
    .btn-refresh {
      flex: 6;
      border-right: 1px solid #555;
    }
    
    .btn-settings {
      flex: 2;
    }
    
    .bottom-bar button:active {
      background: #222;
    }
    
    .mode-tag {
      position: fixed;
      top: 10px;
      left: 10px;
      background: #333;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      z-index: 50;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    .mode-tag.show {
      display: block;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-content h2 {
      margin-bottom: 14px;
      font-size: 1.1rem;
      font-weight: 500;
    }
    
    .modal-section {
      margin-bottom: 16px;
    }
    
    .modal-section label {
      display: block;
      margin-bottom: 6px;
      color: #666;
      font-size: 0.9rem;
    }
    
    .modal-section input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    
    .modal-section input:focus {
      outline: none;
      border-color: #333;
    }
    
    .category-select {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    
    .category-btn {
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 16px;
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .category-btn.selected {
      background: #333;
      color: white;
      border-color: #333;
    }
    
    .import-btn {
      width: 100%;
      padding: 10px;
      background: #f0f0f0;
      border: 1px dashed #999;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #666;
    }
    
    .modal-buttons {
      display: flex;
      gap: 8px;
    }
    
    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
    }
    
    .btn-cancel {
      background: #eee;
      color: #333;
    }
    
    .btn-save {
      background: #333;
      color: white;
    }
    
    .grid-setting-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .expand-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 4px 8px;
    }
    
    .expand-btn:active {
      color: #333;
    }
    
    .grid-preview {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 12px;
    }
    
    .grid-custom-section {
      animation: slideDown 0.2s ease;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .grid-input-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .grid-input-group {
      flex: 1;
    }
    
    .grid-input-group label {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 4px;
    }
    
    .grid-input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      text-align: center;
    }
    
    .grid-separator {
      font-size: 1.2rem;
      color: #666;
      padding-bottom: 10px;
    }
    
    .grid-quick-select {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .grid-quick-btn {
      flex: 1;
      min-width: 60px;
      padding: 8px 12px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .grid-quick-btn.selected {
      background: #333;
      color: white;
      border-color: #333;
    }
    
    .search-type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .search-type-toggle button {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    
    .search-type-toggle button.active {
      background: #333;
      color: white;
      border-color: #333;
    }
    
    .category-filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    
    .category-filter-btn {
      padding: 10px 16px;
      border: 2px solid #ddd;
      border-radius: 20px;
      background: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .category-filter-btn:active {
      border-color: #333;
      background: #f5f5f5;
    }
    
    .search-results {
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 8px;
    }
    
    .search-result-item {
      display: flex;
      align-items: center;
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    
    .search-result-item:last-child {
      border-bottom: none;
    }
    
    .search-result-item:active {
      background: #f5f5f5;
    }
    
    .search-result-item img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      margin-right: 12px;
      border-radius: 4px;
      background: #f0f0f0;
    }
    
    .search-result-info {
      flex: 1;
      overflow: hidden;
    }
    
    .search-result-name {
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .search-result-tag {
      font-size: 0.75rem;
      color: #666;
      margin-top: 2px;
    }
    
    .search-result-category {
      font-size: 0.7rem;
      color: #999;
      margin-top: 2px;
    }
    
    .no-results {
      padding: 20px;
      text-align: center;
      color: #999;
    }
    
    .toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    
    .toast.show {
      opacity: 1;
    }
    
    #debug-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #ff0;
      color: #000;
      padding: 10px;
      font-size: 12px;
      z-index: 9999;
      max-height: 50vh;
      overflow-y: auto;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="debug-panel">
    <div id="debug-log">Loading...</div>
  </div>
  
  <button class="mode-tag" id="mode-tag">tags</button>
  
  <div class="meme-grid" id="meme-grid"></div>
  
  <div class="bottom-bar">
    <button class="btn-search" id="search-btn">搜索</button>
    <button class="btn-refresh" id="refresh-btn">刷新</button>
    <button class="btn-settings" id="settings-btn">设置</button>
  </div>
  
  <div class="modal" id="settings-modal">
    <div class="modal-content">
      <h2>设置</h2>
      <div class="modal-section">
        <div class="grid-setting-header">
          <label>排列方式</label>
          <button class="expand-btn" id="expand-grid-btn">展开设置 ▼</button>
        </div>
        <div class="grid-preview" id="grid-preview">1 × 1</div>
        <div class="grid-custom-section" id="grid-custom-section" style="display:none">
          <div class="grid-input-row">
            <div class="grid-input-group">
              <label>行数 (1-6)</label>
              <input type="number" id="grid-rows-input" min="1" max="6" value="1">
            </div>
            <span class="grid-separator">×</span>
            <div class="grid-input-group">
              <label>列数 (1-4)</label>
              <input type="number" id="grid-cols-input" min="1" max="4" value="1">
            </div>
          </div>
        </div>
      </div>
      <div class="modal-section">
        <label>导入表情包 (zip)</label>
        <button class="import-btn" id="import-btn">点击选择 zip 文件</button>
        <input type="file" id="zip-file-input" accept=".zip,application/zip" style="display:none">
      </div>
      <div class="modal-section">
        <label>配置管理</label>
        <button class="import-btn" id="export-config-btn" style="margin-bottom: 8px;">导出配置</button>
        <button class="import-btn" id="import-config-btn">导入配置</button>
        <input type="file" id="config-file-input" accept=".json" style="display:none">
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" id="cancel-btn">取消</button>
        <button class="btn-save" id="save-btn">保存</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="tag-modal">
    <div class="modal-content">
      <h2>编辑标签</h2>
      <div class="modal-section">
        <label>标签描述</label>
        <input type="text" id="tag-input" placeholder="输入标签文字">
      </div>
      <div class="modal-section">
        <label>分类</label>
        <div class="category-select" id="category-select">
          <button class="category-btn" data-category="happy">快乐/滑稽</button>
          <button class="category-btn" data-category="sad">悲伤/委屈</button>
          <button class="category-btn" data-category="shock">震惊/愤怒</button>
          <button class="category-btn" data-category="social">阴阳怪气/社交</button>
        </div>
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" id="tag-cancel-btn">取消</button>
        <button class="btn-save" id="tag-save-btn">保存</button>
      </div>
    </div>
  </div>
  
  <div class="modal" id="search-modal">
    <div class="modal-content">
      <h2>搜索表情包</h2>
      <div class="search-type-toggle">
        <button id="search-type-tag" class="active">标签</button>
        <button id="search-type-category">分类</button>
      </div>
      <div id="tag-search-section">
        <div class="modal-section">
          <input type="text" id="search-input" placeholder="输入标签搜索">
        </div>
        <div class="modal-section">
          <div class="search-results" id="search-results">
            <div class="no-results">输入关键词搜索</div>
          </div>
        </div>
      </div>
      <div id="category-search-section" style="display:none">
        <div class="modal-section">
          <label>选择分类</label>
          <div class="category-filter-list">
            <button class="category-filter-btn" data-category="happy">快乐/滑稽</button>
            <button class="category-filter-btn" data-category="sad">悲伤/委屈</button>
            <button class="category-filter-btn" data-category="shock">震惊/愤怒</button>
            <button class="category-filter-btn" data-category="social">阴阳怪气/社交</button>
          </div>
        </div>
        <div class="modal-section">
          <label>排序</label>
          <div class="category-filter-list">
            <button class="category-filter-btn sort-btn" data-sort="most">最多使用</button>
            <button class="category-filter-btn sort-btn" data-sort="recent">最近使用</button>
          </div>
        </div>
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" id="search-close-btn">关闭</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script src="jszip.min.js"></script>
  <script>
    var memes = []
    var currentMemes = []
    var gridConfig = { rows: 1, cols: 1 }
    var weights = {}
    var memeTags = {}
    var memeUsage = {}
    var currentTagEditIndex = -1
    var searchType = 'tag'
    var currentFilter = null
    var longPressTimer = null
    var longPressDuration = 500
    var isLongPress = false

    // 历史页面功能：保存最近10页的索引
    var pageHistory = []
    var currentHistoryIndex = -1
    var maxHistorySize = 10

    var isAndroid = typeof Capacitor !== 'undefined' && Capacitor.isNativePlatform()
    var Share = isAndroid ? Capacitor.Plugins.Share : null
    var Filesystem = isAndroid ? Capacitor.Plugins.Filesystem : null
    
    var categoryNames = {
      happy: '快乐/滑稽',
      sad: '悲伤/委屈',
      shock: '震惊/愤怒',
      social: '阴阳怪气/社交'
    }
    
    function loadWeights() {
      try {
        var saved = localStorage.getItem('meme-weights')
        if (saved) {
          weights = JSON.parse(saved)
        }
      } catch (e) {
        weights = {}
      }
    }
    
    function saveWeights() {
      try {
        localStorage.setItem('meme-weights', JSON.stringify(weights))
      } catch (e) {}
    }
    
    function loadTags() {
      try {
        var saved = localStorage.getItem('meme-tags')
        if (saved) {
          memeTags = JSON.parse(saved)
        }
      } catch (e) {
        memeTags = {}
      }
    }
    
    function saveTags() {
      try {
        localStorage.setItem('meme-tags', JSON.stringify(memeTags))
      } catch (e) {}
    }
    
    function loadGridConfig() {
      try {
        var saved = localStorage.getItem('meme-grid-config')
        if (saved) {
          gridConfig = JSON.parse(saved)
        }
      } catch (e) {
        gridConfig = { rows: 1, cols: 1 }
      }
    }
    
    function saveGridConfig() {
      try {
        localStorage.setItem('meme-grid-config', JSON.stringify(gridConfig))
      } catch (e) {}
    }
    
    function loadMemeUsage() {
      try {
        var saved = localStorage.getItem('meme-usage')
        if (saved) {
          memeUsage = JSON.parse(saved)
        }
      } catch (e) {
        memeUsage = {}
      }
    }
    
    function saveMemeUsage() {
      try {
        localStorage.setItem('meme-usage', JSON.stringify(memeUsage))
      } catch (e) {}
    }
    
    function recordMemeUsage(memeName) {
      if (!memeUsage[memeName]) {
        memeUsage[memeName] = { count: 0, lastUsed: 0 }
      }
      memeUsage[memeName].count++
      memeUsage[memeName].lastUsed = Date.now()
      saveMemeUsage()
    }
    
    async function loadMemes() {
      if (isAndroid && Filesystem) {
        try {
          var result = await Filesystem.readdir({
            path: 'assets',
            directory: 'Data'
          })
          memes = result.files.filter(function(f) {
            var ext = f.name.split('.').pop().toLowerCase()
            return ['jpg', 'jpeg', 'png', 'gif', 'webp'].indexOf(ext) >= 0
          }).map(function(f) { return f.name })
          return
        } catch (e) {}
      }
      try {
        var response = await fetch('assets/memes.json')
        memes = await response.json()
      } catch (e) {
        memes = []
      }
    }
    
    function parseGridConfig(input) {
      var match = input.trim().match(/^(\d+)\s*[xX×]\s*(\d+)$/)
      if (match) {
        return { rows: Math.min(Math.max(1, parseInt(match[1])), 4), cols: Math.min(Math.max(1, parseInt(match[2])), 4) }
      }
      return { rows: 1, cols: 1 }
    }
    
    function renderGrid() {
      var grid = document.getElementById('meme-grid')
      var rows = gridConfig.rows
      var cols = gridConfig.cols
      var total = rows * cols
      
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)'
      grid.style.gridTemplateRows = 'repeat(' + rows + ', 1fr)'
      grid.innerHTML = ''
      
      currentMemes = []
      
      for (var i = 0; i < total; i++) {
        var item = document.createElement('div')
        item.className = 'meme-item'
        item.dataset.index = i
        
        var img = document.createElement('img')
        img.src = ''
        item.appendChild(img)
        
        var weightLabel = document.createElement('div')
        weightLabel.className = 'meme-weight'
        weightLabel.textContent = '1'
        item.appendChild(weightLabel)
        
        var tagLabel = document.createElement('div')
        tagLabel.className = 'meme-tag'
        tagLabel.textContent = ''
        item.appendChild(tagLabel)
        
        item.addEventListener('click', function(idx) {
          return function() {
            if (isLongPress) {
              isLongPress = false
              return
            }
            shareMeme(idx)
          }
        }(i))
        
        if (isAndroid) {
          (function(idx) {
            item.addEventListener('touchstart', function(e) {
              isLongPress = false
              longPressTimer = setTimeout(function() {
                isLongPress = true
                openTagModal(idx)
              }, longPressDuration)
            }, { passive: true })
            
            item.addEventListener('touchend', function(e) {
              if (longPressTimer) {
                clearTimeout(longPressTimer)
                longPressTimer = null
              }
            })
            
            item.addEventListener('touchmove', function(e) {
              if (longPressTimer) {
                clearTimeout(longPressTimer)
                longPressTimer = null
              }
            }, { passive: true })
          })(i)
        }
        
        grid.appendChild(item)
        currentMemes.push(null)
      }
    }
    
    function getRandomMeme(useWeight) {
      var filteredMemes = memes
      
      if (currentFilter) {
        if (currentFilter.type === 'category') {
          filteredMemes = memes.filter(function(meme) {
            var tag = memeTags[meme]
            if (!tag) return false
            return tag.category === currentFilter.value
          })
        } else if (currentFilter.type === 'sort') {
          return null
        }
      }
      
      if (filteredMemes.length === 0) return null
      
      if (useWeight && Object.keys(weights).length > 0) {
        var totalWeight = filteredMemes.reduce(function(sum, meme) { return sum + (weights[meme] || 1) }, 0)
        var random = Math.random() * totalWeight
        
        for (var i = 0; i < filteredMemes.length; i++) {
          var meme = filteredMemes[i]
          random -= (weights[meme] || 1)
          if (random <= 0) {
            return meme
          }
        }
      }
      
      return filteredMemes[Math.floor(Math.random() * filteredMemes.length)]
    }
    
    function getSortedMemes(sortType, count) {
      var sortedMemes = []
      
      for (var i = 0; i < memes.length; i++) {
        var meme = memes[i]
        var usage = memeUsage[meme] || { count: 0, lastUsed: 0 }
        sortedMemes.push({
          name: meme,
          count: usage.count,
          lastUsed: usage.lastUsed
        })
      }
      
      if (sortType === 'most') {
        sortedMemes.sort(function(a, b) { return b.count - a.count })
      } else if (sortType === 'recent') {
        sortedMemes.sort(function(a, b) { return b.lastUsed - a.lastUsed })
      }
      
      var result = []
      for (var i = 0; i < Math.min(count, sortedMemes.length); i++) {
        result.push(sortedMemes[i].name)
      }
      
      return result
    }
    
    // 保存当前页面到历史记录
    function saveCurrentPageToHistory() {
      // 如果当前不是历史记录的最新页，删除后面的历史
      if (currentHistoryIndex < pageHistory.length - 1) {
        pageHistory = pageHistory.slice(0, currentHistoryIndex + 1)
      }

      // 保存当前页面的索引（复制数组）
      pageHistory.push(currentMemes.slice())

      // 如果超过最大历史记录数，删除最旧的
      if (pageHistory.length > maxHistorySize) {
        pageHistory.shift()
      }

      // 更新当前历史索引
      currentHistoryIndex = pageHistory.length - 1

      // 更新刷新按钮显示
      updateRefreshButtonText()
    }

    // 更新刷新按钮文本
    function updateRefreshButtonText() {
      var refreshBtn = document.getElementById('refresh-btn')
      if (pageHistory.length > 1 && currentHistoryIndex < pageHistory.length - 1) {
        // 在历史记录中间，显示可以前进
        refreshBtn.textContent = '刷新 (' + (currentHistoryIndex + 1) + '/' + pageHistory.length + ')'
      } else if (currentHistoryIndex > 0) {
        // 在历史记录末尾，但可以返回
        refreshBtn.textContent = '刷新 (' + (currentHistoryIndex + 1) + '/' + pageHistory.length + ')'
      } else {
        refreshBtn.textContent = '刷新'
      }
    }

    // 返回上一页
    function goBackPage() {
      if (currentHistoryIndex <= 0) {
        showToast('已经是第一页了')
        return false
      }

      currentHistoryIndex--
      var prevPage = pageHistory[currentHistoryIndex]

      // 恢复页面
      var items = document.querySelectorAll('.meme-item')
      for (var i = 0; i < items.length && i < prevPage.length; i++) {
        var img = items[i].querySelector('img')
        var weightLabel = items[i].querySelector('.meme-weight')
        var tagLabel = items[i].querySelector('.meme-tag')

        var memeName = prevPage[i]
        currentMemes[i] = memeName

        if (!memeName) {
          img.src = ''
          weightLabel.textContent = '-'
          tagLabel.textContent = ''
          continue
        }

        img.src = 'assets/' + memeName + '?t=' + Date.now() + '-' + i
        weightLabel.textContent = weights[memeName] || 1

        var tag = memeTags[memeName]
        tagLabel.textContent = tag ? (tag.text || '') : ''
      }

      updateRefreshButtonText()
      showToast('已返回上一页 (' + (currentHistoryIndex + 1) + '/' + pageHistory.length + ')')
      return true
    }

    async function refreshAll(saveHistory) {
      // 默认保存历史记录，除非是恢复历史页面时调用
      if (saveHistory !== false) {
        saveCurrentPageToHistory()
      }

      var items = document.querySelectorAll('.meme-item')
      var total = items.length
      var hasPureRandom = total > 3 && !currentFilter

      var sortedMemes = null
      if (currentFilter && currentFilter.type === 'sort') {
        sortedMemes = getSortedMemes(currentFilter.value, total)
      }

      for (var i = 0; i < total; i++) {
        var img = items[i].querySelector('img')
        var weightLabel = items[i].querySelector('.meme-weight')
        var tagLabel = items[i].querySelector('.meme-tag')
        img.style.opacity = '0.5'

        var memeName = null
        if (sortedMemes) {
          memeName = sortedMemes[i] || null
        } else {
          var useWeight = !(hasPureRandom && i === 0)
          memeName = getRandomMeme(useWeight)
        }
        currentMemes[i] = memeName

        if (!memeName) {
          img.src = ''
          img.style.opacity = '1'
          weightLabel.textContent = '-'
          tagLabel.textContent = ''
          continue
        }

        img.src = 'assets/' + memeName + '?t=' + Date.now() + '-' + i
        weightLabel.textContent = weights[memeName] || 1

        var tag = memeTags[memeName]
        tagLabel.textContent = tag ? (tag.text || '') : ''

        img.onload = function() {
          this.style.opacity = '1'
        }
      }

      updateRefreshButtonText()
    }
    
    function showToast(message) {
      var toast = document.getElementById('toast')
      toast.textContent = message
      toast.classList.add('show')
      setTimeout(function() { toast.classList.remove('show') }, 1500)
    }
    
    async function shareMeme(index) {
      var memeName = currentMemes[index]
      if (!memeName) return
      
      if (isAndroid && Share && Filesystem) {
        try {
          var response = await fetch('assets/' + memeName)
          var blob = await response.blob()
          
          var reader = new FileReader()
          reader.onload = async function() {
            try {
              var base64Data = reader.result.split(',')[1]
              var ext = memeName.split('.').pop().toLowerCase()
              var fileName = 'meme_' + Date.now() + '.' + ext
              
              var result = await Filesystem.writeFile({
                path: fileName,
                data: base64Data,
                directory: 'Cache'
              })
              
              await Share.share({
                title: '表情包',
                url: result.uri
              })
                  
                  weights[memeName] = (weights[memeName] || 1) + 1
                  saveWeights()
                  recordMemeUsage(memeName)
                  
                  var weightLabel = document.querySelectorAll('.meme-weight')[index]
                  weightLabel.textContent = weights[memeName]
            } catch (e) {
              if (e.message !== 'User canceled share') {
                showToast('分享失败: ' + (e.message || '未知错误'))
              }
            }
          }
          reader.readAsDataURL(blob)
        } catch (e) {
          showToast('读取文件失败')
        }
      } else {
        weights[memeName] = (weights[memeName] || 1) + 1
        saveWeights()
        recordMemeUsage(memeName)
        
        var weightLabel = document.querySelectorAll('.meme-weight')[index]
        weightLabel.textContent = weights[memeName]
      }
    }
    
    function openSettings() {
      document.getElementById('grid-preview').textContent = gridConfig.rows + ' × ' + gridConfig.cols
      document.getElementById('grid-rows-input').value = gridConfig.rows
      document.getElementById('grid-cols-input').value = gridConfig.cols
      document.getElementById('grid-custom-section').style.display = 'none'
      document.getElementById('expand-grid-btn').textContent = '展开设置 ▼'
      document.getElementById('settings-modal').classList.add('show')
    }
    
    function closeSettings() {
      document.getElementById('settings-modal').classList.remove('show')
    }
    
    function toggleGridSection() {
      var section = document.getElementById('grid-custom-section')
      var btn = document.getElementById('expand-grid-btn')
      if (section.style.display === 'none') {
        section.style.display = 'block'
        btn.textContent = '收起设置 ▲'
      } else {
        section.style.display = 'none'
        btn.textContent = '展开设置 ▼'
      }
    }
    
    function setGridFromInputs() {
      var rows = parseInt(document.getElementById('grid-rows-input').value) || 1
      var cols = parseInt(document.getElementById('grid-cols-input').value) || 1
      rows = Math.min(Math.max(1, rows), 6)
      cols = Math.min(Math.max(1, cols), 4)
      document.getElementById('grid-rows-input').value = rows
      document.getElementById('grid-cols-input').value = cols
      document.getElementById('grid-preview').textContent = rows + ' × ' + cols
    }
    
    async function saveSettings() {
      var rows = parseInt(document.getElementById('grid-rows-input').value) || 1
      var cols = parseInt(document.getElementById('grid-cols-input').value) || 1
      var newConfig = { 
        rows: Math.min(Math.max(1, rows), 6), 
        cols: Math.min(Math.max(1, cols), 4) 
      }
      
      gridConfig = newConfig
      saveGridConfig()
      renderGrid()
      refreshAll()
      
      closeSettings()
    }
    
    function openTagModal(index) {
      currentTagEditIndex = index
      var memeName = currentMemes[index]
      
      document.querySelectorAll('#tag-modal .category-btn').forEach(function(btn) {
        btn.classList.remove('selected')
      })
      
      if (memeName) {
        var tag = memeTags[memeName]
        if (tag) {
          document.getElementById('tag-input').value = tag.text || ''
          if (tag.category) {
            var btn = document.querySelector('#tag-modal .category-btn[data-category="' + tag.category + '"]')
            if (btn) btn.classList.add('selected')
          }
        } else {
          document.getElementById('tag-input').value = ''
        }
      } else {
        document.getElementById('tag-input').value = ''
      }
      
      document.getElementById('tag-modal').classList.add('show')
    }
    
    function closeTagModal() {
      document.getElementById('tag-modal').classList.remove('show')
      currentTagEditIndex = -1
    }
    
    function saveTag() {
      if (currentTagEditIndex < 0) return
      
      var memeName = currentMemes[currentTagEditIndex]
      if (!memeName) {
        closeTagModal()
        return
      }
      
      var text = document.getElementById('tag-input').value.trim()
      var selectedCategory = document.querySelector('#tag-modal .category-btn.selected')
      var category = selectedCategory ? selectedCategory.dataset.category : null
      
      if (text || category) {
        memeTags[memeName] = { text: text, category: category }
      } else {
        delete memeTags[memeName]
      }
      saveTags()
      
      var tagLabel = document.querySelectorAll('.meme-tag')[currentTagEditIndex]
      tagLabel.textContent = text
      
      closeTagModal()
      showToast('标签已保存')
    }
    
    document.querySelectorAll('#tag-modal .category-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#tag-modal .category-btn').forEach(function(b) { b.classList.remove('selected') })
        btn.classList.add('selected')
      })
    })
    
    function openSearch() {
      document.getElementById('search-input').value = ''
      document.getElementById('search-results').innerHTML = '<div class="no-results">输入关键词搜索</div>'
      setSearchType('tag')
      document.getElementById('search-modal').classList.add('show')
      setTimeout(function() { document.getElementById('search-input').focus() }, 100)
    }
    
    function closeSearch() {
      document.getElementById('search-modal').classList.remove('show')
    }
    
    function setSearchType(type) {
      searchType = type
      document.getElementById('search-type-tag').classList.toggle('active', type === 'tag')
      document.getElementById('search-type-category').classList.toggle('active', type === 'category')
      document.getElementById('tag-search-section').style.display = type === 'tag' ? 'block' : 'none'
      document.getElementById('category-search-section').style.display = type === 'category' ? 'block' : 'none'
    }
    
    function performSearch() {
      var query = document.getElementById('search-input').value.trim().toLowerCase()
      var resultsDiv = document.getElementById('search-results')
      
      if (!query) {
        resultsDiv.innerHTML = '<div class="no-results">输入关键词搜索</div>'
        return
      }
      
      var results = []
      
      for (var i = 0; i < memes.length; i++) {
        var meme = memes[i]
        var tag = memeTags[meme] || null
        
        if (tag && tag.text && tag.text.toLowerCase().indexOf(query) >= 0) {
          results.push({
            name: meme,
            tag: tag
          })
        }
      }
      
      if (results.length === 0) {
        resultsDiv.innerHTML = '<div class="no-results">没有找到匹配的表情包</div>'
        return
      }
      
      var html = ''
      for (var i = 0; i < results.length; i++) {
        var r = results[i]
        html += '<div class="search-result-item" data-meme="' + r.name + '">'
        html += '<img src="assets/' + r.name + '?t=' + Date.now() + '">'
        html += '<div class="search-result-info">'
        html += '<div class="search-result-name">' + r.name + '</div>'
        html += '<div class="search-result-tag">' + (r.tag && r.tag.text ? r.tag.text : '无标签') + '</div>'
        html += '<div class="search-result-category">' + (r.tag && r.tag.category ? categoryNames[r.tag.category] : '') + '</div>'
        html += '</div></div>'
      }
      resultsDiv.innerHTML = html
      
      resultsDiv.querySelectorAll('.search-result-item').forEach(function(item) {
        item.addEventListener('click', function() {
          showMemeFromSearch(item.dataset.meme)
        })
      })
    }
    
    async function showMemeFromSearch(memeName) {
      closeSearch()
      
      var items = document.querySelectorAll('.meme-item')
      var img = items[0].querySelector('img')
      var weightLabel = items[0].querySelector('.meme-weight')
      var tagLabel = items[0].querySelector('.meme-tag')
      
      currentMemes[0] = memeName
      img.src = 'assets/' + memeName + '?t=' + Date.now()
      
      weightLabel.textContent = weights[memeName] || 1
      
      var tag = memeTags[memeName]
      tagLabel.textContent = tag ? (tag.text || '') : ''
    }
    
    function selectCategory(category) {
      currentFilter = { type: 'category', value: category }
      document.getElementById('mode-tag').textContent = categoryNames[category]
      document.getElementById('mode-tag').classList.add('show')
      closeSearch()
      refreshAll()
    }
    
    function selectSort(sortType) {
      currentFilter = { type: 'sort', value: sortType }
      document.getElementById('mode-tag').textContent = sortType === 'most' ? '最多使用' : '最近使用'
      document.getElementById('mode-tag').classList.add('show')
      closeSearch()
      refreshAll()
    }
    
    function clearFilter() {
      currentFilter = null
      document.getElementById('mode-tag').textContent = 'tags'
      document.getElementById('mode-tag').classList.remove('show')
      refreshAll()
    }
    
    async function importZip() {
      // 使用现有的 input 元素
      var input = document.getElementById('zip-file-input')

      input.onchange = async function(e) {
        var file = e.target.files[0]
        if (!file) {
          showToast('未选择文件')
          return
        }

        showToast('正在读取 ZIP 文件...')

        try {
          // 读取文件内容
          var arrayBuffer = await file.arrayBuffer()
          var zip = await JSZip.loadAsync(arrayBuffer)
          var count = 0

          var validExts = ['.jpg', '.jpeg', '.png', '.gif', '.webp']
          var entries = Object.entries(zip.files)

          showToast('正在解压 ' + entries.length + ' 个文件...')

          for (var i = 0; i < entries.length; i++) {
            var filename = entries[i][0]
            var zipEntry = entries[i][1]
            if (!zipEntry.dir) {
              var ext = '.' + filename.split('.').pop().toLowerCase()
              if (validExts.indexOf(ext) >= 0) {
                var baseName = filename.split('/').pop()
                var content = await zipEntry.async('base64')

                if (isAndroid && Filesystem) {
                  // Android: 写入到应用私有目录
                  try {
                    await Filesystem.writeFile({
                      path: 'assets/' + baseName,
                      data: content,
                      directory: 'Data',
                      recursive: true
                    })
                    count++
                  } catch (writeErr) {
                    console.error('写入文件失败:', baseName, writeErr)
                  }
                } else {
                  // 浏览器环境暂不支持保存文件
                  console.log('浏览器环境跳过保存:', baseName)
                }
              }
            }
          }

          if (count > 0) {
            await loadMemes()
            showToast('成功导入 ' + count + ' 张表情包')
            refreshAll()
          } else {
            showToast('ZIP 中没有找到有效的图片文件')
          }
        } catch (e) {
          console.error('导入 ZIP 失败:', e)
          showToast('导入失败: ' + (e.message || '请检查 ZIP 文件格式'))
        }

        // 清空 input 以便下次选择同一文件
        input.value = ''
      }

      input.click()
    }
    
    async function exportConfig() {
      try {
        var configData = {
          version: '1.0',
          exportTime: new Date().toISOString(),
          gridConfig: gridConfig,
          weights: weights,
          tags: memeTags,
          usage: memeUsage
        }

        var jsonStr = JSON.stringify(configData, null, 2)
        var fileName = 'memeflow-config-' + new Date().getTime() + '.json'

        if (isAndroid && Share && Filesystem) {
          // Android: 先写入缓存目录，然后通过系统分享
          var result = await Filesystem.writeFile({
            path: fileName,
            data: btoa(unescape(encodeURIComponent(jsonStr))),
            directory: 'Cache'
          })

          await Share.share({
            title: 'MemeFlow 配置导出',
            text: 'MemeFlow 配置文件',
            url: result.uri,
            dialogTitle: '导出配置到...'
          })
          showToast('请选择保存位置或分享方式')
        } else {
          // 浏览器: 使用 Blob 下载
          var blob = new Blob([jsonStr], { type: 'application/json' })
          var url = URL.createObjectURL(blob)
          var a = document.createElement('a')
          a.href = url
          a.download = fileName
          document.body.appendChild(a)
          a.click()
          document.body.removeChild(a)
          URL.revokeObjectURL(url)
          showToast('配置已导出')
        }
      } catch (e) {
        if (e.message && e.message.includes('canceled')) {
          // 用户取消，不显示错误
          return
        }
        showToast('导出失败: ' + (e.message || '未知错误'))
      }
    }

    async function selectConfigFile() {
      // 使用现有的 input 元素
      var input = document.getElementById('config-file-input')

      // 重置 onchange 事件
      input.onchange = async function(e) {
        var file = e.target.files[0]
        if (!file) {
          showToast('未选择文件')
          return
        }

        showToast('正在读取配置...')

        try {
          var jsonStr

          if (isAndroid && file.uri && Filesystem) {
            // Android: 通过 URI 读取文件
            var result = await Filesystem.readFile({
              path: file.uri
            })
            // 尝试解析 base64 或纯文本
            try {
              jsonStr = decodeURIComponent(escape(atob(result.data)))
            } catch (e) {
              // 如果不是 base64，直接使用原始数据
              jsonStr = result.data
            }
          } else {
            // 浏览器: 读取文件
            jsonStr = await file.text()
          }

          var configData = JSON.parse(jsonStr)

          // 验证版本
          if (!configData.version) {
            showToast('无效的配置文件格式')
            return
          }

          // 导入网格配置（覆盖）
          if (configData.gridConfig) {
            gridConfig = {
              rows: Math.min(Math.max(1, configData.gridConfig.rows || 1), 6),
              cols: Math.min(Math.max(1, configData.gridConfig.cols || 1), 4)
            }
            saveGridConfig()
          }

          // 导入权重（增量合并，同一张表情覆盖）
          if (configData.weights) {
            for (var meme in configData.weights) {
              weights[meme] = configData.weights[meme]
            }
            saveWeights()
          }

          // 导入标签（增量合并，同一张表情覆盖）
          if (configData.tags) {
            for (var meme in configData.tags) {
              memeTags[meme] = configData.tags[meme]
            }
            saveTags()
          }

          // 导入使用记录（增量合并，同一张表情覆盖）
          if (configData.usage) {
            for (var meme in configData.usage) {
              memeUsage[meme] = configData.usage[meme]
            }
            saveMemeUsage()
          }

          // 重新渲染
          renderGrid()
          refreshAll()
          showToast('配置已导入')
        } catch (e) {
          showToast('导入失败: ' + (e.message || '请检查文件格式'))
        }

        // 清空 input 以便下次选择同一文件
        input.value = ''
      }

      input.click()
    }
    
    // 刷新按钮点击事件
    var refreshBtn = document.getElementById('refresh-btn')
    var refreshLongPressTimer = null
    var refreshLongPressDuration = 600
    var isRefreshLongPress = false

    refreshBtn.addEventListener('click', function() {
      if (isRefreshLongPress) {
        isRefreshLongPress = false
        return
      }
      refreshAll()
    })

    // 刷新按钮长按事件 - 返回上一页
    refreshBtn.addEventListener('touchstart', function(e) {
      isRefreshLongPress = false
      refreshLongPressTimer = setTimeout(function() {
        isRefreshLongPress = true
        goBackPage()
      }, refreshLongPressDuration)
    }, { passive: true })

    refreshBtn.addEventListener('touchend', function(e) {
      if (refreshLongPressTimer) {
        clearTimeout(refreshLongPressTimer)
        refreshLongPressTimer = null
      }
    })

    refreshBtn.addEventListener('touchmove', function(e) {
      if (refreshLongPressTimer) {
        clearTimeout(refreshLongPressTimer)
        refreshLongPressTimer = null
      }
    }, { passive: true })

    // PC端鼠标长按支持
    refreshBtn.addEventListener('mousedown', function(e) {
      isRefreshLongPress = false
      refreshLongPressTimer = setTimeout(function() {
        isRefreshLongPress = true
        goBackPage()
      }, refreshLongPressDuration)
    })

    refreshBtn.addEventListener('mouseup', function(e) {
      if (refreshLongPressTimer) {
        clearTimeout(refreshLongPressTimer)
        refreshLongPressTimer = null
      }
    })

    refreshBtn.addEventListener('mouseleave', function(e) {
      if (refreshLongPressTimer) {
        clearTimeout(refreshLongPressTimer)
        refreshLongPressTimer = null
      }
    })
    document.getElementById('settings-btn').addEventListener('click', openSettings)
    document.getElementById('cancel-btn').addEventListener('click', closeSettings)
    document.getElementById('save-btn').addEventListener('click', saveSettings)
    document.getElementById('import-btn').addEventListener('click', importZip)
    document.getElementById('expand-grid-btn').addEventListener('click', toggleGridSection)
    document.getElementById('export-config-btn').addEventListener('click', exportConfig)
    document.getElementById('import-config-btn').addEventListener('click', selectConfigFile)
    
    document.getElementById('grid-rows-input').addEventListener('input', setGridFromInputs)
    document.getElementById('grid-cols-input').addEventListener('input', setGridFromInputs)
    
    document.getElementById('tag-cancel-btn').addEventListener('click', closeTagModal)
    document.getElementById('tag-save-btn').addEventListener('click', saveTag)
    
    document.getElementById('search-btn').addEventListener('click', openSearch)
    document.getElementById('search-close-btn').addEventListener('click', closeSearch)
    document.getElementById('search-type-tag').addEventListener('click', function() { setSearchType('tag') })
    document.getElementById('search-type-category').addEventListener('click', function() { setSearchType('category') })
    document.getElementById('search-input').addEventListener('input', performSearch)
    document.getElementById('mode-tag').addEventListener('click', clearFilter)
    
    document.querySelectorAll('.category-filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        if (btn.dataset.category) {
          selectCategory(btn.dataset.category)
        } else if (btn.dataset.sort) {
          selectSort(btn.dataset.sort)
        }
      })
    })
    
    async function init() {
      loadWeights()
      loadTags()
      loadGridConfig()
      loadMemeUsage()
      await loadMemes()
      renderGrid()
      refreshAll()
      setTimeout(function() {
        document.getElementById('debug-panel').style.display = 'none'
      }, 1000)
    }
    
    init()
  </script>
